<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>PGS Claude Practice Lab</title>
<meta name="description" content="Hands-on Claude adoption workshop for Math, V2, iGaming, and cross-functional teams at Pong Game Studios." />
<meta name="theme-color" content="#1a1a18" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" />

<link rel="stylesheet" href="styles.css" />

<style>
  /* Initial paint while React boots */
  .boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--paper);
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--ink-2);
    z-index: 1000;
  }
  .boot.hide { display: none; }
</style>
</head>
<body>

<div id="boot" class="boot"><span class="display-i">PGS Claude Practice Lab</span></div>
<div id="root"></div>

<!-- QR code generator (small, no deps) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

<!-- React + Babel (pinned with integrity) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Content + components -->
<script src="src/content.js"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/builder.jsx"></script>
<script type="text/babel" src="src/presenter.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script>
  // Hide boot once React mounts
  const obs = new MutationObserver(() => {
    const root = document.getElementById("root");
    if (root && root.firstChild) {
      const b = document.getElementById("boot");
      if (b) b.classList.add("hide");
      obs.disconnect();
    }
  });
  obs.observe(document.getElementById("root"), { childList: true });
  setTimeout(() => { const b = document.getElementById("boot"); if (b) b.classList.add("hide"); }, 4000);
</script>

</body>
</html>
